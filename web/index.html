<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Site Cito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<!-- Conteneur de ton application Flutter -->
<div id="flutter_app">
    <!-- Flutter injecte son rendu ici -->
    <script src="main.dart.js"></script>
</div>

<!-- Formulaire Netlify -->
<h2>Inscription</h2>
<form name="inscription" method="POST" data-netlify="true" action="success.html">
    <!-- Champ caché obligatoire -->
    <input type="hidden" name="form-name" value="inscription">

    <p><label>Nom : <input type="text" name="nom" required></label></p>
    <p><label>Email : <input type="email" name="email" required></label></p>
    <p><button type="submit">S’inscrire</button></p>
</form>
</body>
</html>
