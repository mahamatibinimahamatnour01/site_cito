<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
</head>
<body>
<h1>Formulaire d'inscription</h1>

<form name="inscription" method="POST" data-netlify="true" action="success.html">
    <!-- Champ caché obligatoire pour Netlify -->
    <input type="hidden" name="form-name" value="inscription">

    <label>Nom :
        <input type="text" name="nom" required>
    </label>
    <br>

    <label>Email :
        <input type="email" name="email" required>
    </label>
    <br>

    <label>Formation :
        <input type="text" name="formation" required>
    </label>
    <br>

    <button type="submit">S’inscrire</button>
</form>
</body>
</html>
