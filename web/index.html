<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Site Cito - Formulaire</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<!-- Formulaire Netlify sans redirection -->
<h2>Inscription</h2>
<form name="inscription" method="POST" data-netlify="true">
    <!-- Champ caché obligatoire -->
    <input type="hidden" name="form-name" value="inscription">

    <p><label>Nom : <input type="text" name="nom" required></label></p>
    <p><label>Email : <input type="email" name="email" required></label></p>
    <p><button type="submit">S’inscrire</button></p>
</form>
</body>
</html>
