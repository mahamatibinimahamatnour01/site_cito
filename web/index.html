<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
</head>
<body>
<h1>Formulaire d'inscription</h1>

<!-- Formulaire Netlify -->
<form name="inscription" method="POST" data-netlify="true" action="success.html" enctype="multipart/form-data">
    <!-- Champ caché obligatoire -->
    <input type="hidden" name="form-name" value="inscription">

    <p>
        <label>Nom : <input type="text" name="nom" required></label>
    </p>
    <p>
        <label>Email : <input type="email" name="email" required></label>
    </p>
    <p>
        <label>Formation : <input type="text" name="formation" required></label>
    </p>
    <p>
        <label>Fichier (optionnel) : <input type="file" name="fichier"></label>
    </p>

    <p>
        <button type="submit">S’inscrire</button>
    </p>
</form>

<!-- Script pour alerte personnalisée (optionnel) -->
<script>
    const handleSubmit = event => {
      event.preventDefault();
      const myForm = event.target;
      const formData = new FormData(myForm);

      fetch("/", {
        method: "POST",
        body: new URLSearchParams(formData).toString(),
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
        .then(() => alert("Merci pour votre inscription !"))
        .catch(error => alert("Erreur : " + error));
    };

    document.querySelector("form").addEventListener("submit", handleSubmit);
</script>
</body>
</html>
